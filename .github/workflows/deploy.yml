name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
    paths:
      - 'web/src/**'
      - 'web/public/**'
      - 'web/package*.json'
      - 'web/wrangler.jsonc'
      - 'web/next.config.ts'
      - 'web/open-next.config.ts'
      - 'web/drizzle.config.ts'
      - 'web/postcss.config.mjs'
      - 'web/eslint.config.mjs'
      - 'web/tsconfig.json'
      - 'web/components.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build with @opennextjs/cloudflare
        working-directory: web
        run: npx opennextjs-cloudflare build 2>&1 | tail -100
        env:
          NODE_ENV: production

      - name: Verify build output
        working-directory: web
        run: |
          echo "=== Checking .open-next directory ==="
          ls -la .open-next/ 2>/dev/null || echo ".open-next not found"
          echo "=== Checking worker.js ==="
          ls -la .open-next/worker.js 2>/dev/null || echo "worker.js not found"
          echo "=== Checking assets ==="
          ls -la .open-next/assets/ 2>/dev/null || echo "assets not found"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: web
          packageManager: npm
